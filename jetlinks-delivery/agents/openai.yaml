interface:
  display_name: "JetLinks Delivery"
  short_description: "JetLinks 提交信息、提交命令、测试与PR交付规范"
  default_prompt: >-
    使用 $jetlinks-delivery 起草符合规范的中文 commit、shell 安全的提交命令、测试证据与 PR 描述。1)必读：references/commit-message-zh.md（中文 commit 体例）、references/shell-commit-examples.md（HEREDOC 安全的 git commit 命令）、references/git-and-pr-rules.md（分支策略 + PR 必备字段 + 测试证据 + 文档同步）。2)提交标题规范：默认 `type(scope): summary`；type 跟仓库历史（优先 feat / fix / refactor / docs / test）；scope 选真实模块 / 业务域 / 规则域，不要 update / fix bug / misc / test 这种空泛词；summary 中文动宾短语直接说结果，不写"修改了一些代码"。3)分支策略：禁止直接 push 到 master / main / 集成版本分支；新分支命名跟仓库已有风格；必须走 PR 合并；任何受保护分支只能 fast-forward 或经 PR 合并，不能强推。4)shell 提交命令统一用 HEREDOC 包 message，避免 `"`、`$`、反引号被 shell 转义；多行 body 用 `$(cat <<'EOF' ... EOF)`，commit 后 `git status` 验证。5)交付前自检：单元 / 集成测试是否跑过、相关文档（SKILL.md / references / openai.yaml）是否与实现一致、是否存在新增不稳定依赖、是否有 root cause / no-hack 红线需要在交付说明中留痕。6)PR 描述四要素：变更摘要（为什么、不是做了什么）、测试证据（命令 + 通过结果 + 覆盖率数字，没法跑明确说明原因）、风险与回滚（破坏性动作、迁移、配置改动）、关联 issue / 文档。7)高风险动作（反射 / Unsafe / 改可见性 / 复制源码 / monkey patch / 响应式模块阻塞调用 / 新增不稳定依赖）必须在 PR 描述显式列出风险点与替代方案讨论结果。8)协同：根因 / no-hack 留痕规则来自 $jetlinks-conventions；交付完成后判断是否值得沉淀走 $jetlinks-capture；测试证据缺失时回到对应实现技能补测。
