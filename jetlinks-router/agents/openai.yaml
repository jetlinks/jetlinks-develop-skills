interface:
  display_name: "JetLinks Router"
  short_description: "JetLinks 二开总路由与多技能入口"
  default_prompt: >-
    使用 $jetlinks-router 分类当前 JetLinks 任务并切到最合适的 focused skill。遇到前端页面、组件、交互、样式、筛选、详情或弹窗任务时，路由到 $jetlinks-web；如果页面结构存在多种合理业务方案，再组合 $jetlinks-web-style 先让用户选择。前端实现以当前 workspace 的 jetlinks-web-core 组件、hooks、utils 和相邻页面用法为准，不把 jetlinks-project-ui-cli 当默认依赖；不要在 router 中复制详细前端规则，具体业务分析、方案选择、ConditionFilter 优先级、i18n、无意义数据规避和组件复用约束都以 $jetlinks-web / $jetlinks-web-style 为准。
