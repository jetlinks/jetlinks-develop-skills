interface:
  display_name: "JetLinks Reactive"
  short_description: "JetLinks 响应式编程与非阻塞实践"
  default_prompt: >-
    使用 $jetlinks-reactive 保证当前 JetLinks 改动与本地 Mono / Flux 风格一致并避免阻塞错误。1)先确认当前模块是响应式还是阻塞式：看控制器返回类型、服务基类、仓储抽象、相邻模块是否普遍使用 Mono / Flux / 异步事件 / 异步订阅；模块是阻塞式就跟随现有阻塞事务边界，不要为局部新功能强行包响应式外壳。2)响应式模块基本要求：Controller / Service / 事件处理器 / 订阅处理器之间保持 Mono / Flux 连续传递；不用 block() 回退成同步；主业务控制流留在返回链中，subscribe() 只能用于框架托管之外且明确隔离的边缘场景；批处理优先于逐条处理（批量更新 / 删除 / 消费 / 联动同步用批量抽象，禁止在 flatMap 内逐条做 DB 或远程调用形成 N 次往返）；外部副作用（发布消息 / 远程调用 / 缓存同步 / 广播通知）优先后移到事件层或提交后阶段，不全部塞进 CRUD 主链路。3)映射算子选择：保持顺序用 concatMap；允许并发且模块已有惯例用 flatMap；纯同步映射用 map。4)错误传播：用户可见异常在 Mono.error / Flux.error 中传带 i18nCode 的异常实例，不直接 new XxxException("对象不存在")；模块异常模型只支持 message 时在链路边界做本地化解析。5)阻塞依赖：先找仓库同类边界的非阻塞抽象；没有就只在必要边界隔离阻塞调用；超时缓存优先 org.hswebframework.web.cache.ReactiveCache，本地 TTL/size 用 com.github.benmanes.caffeine.cache.Caffeine，不拼装临时缓存。6)事件 / 订阅处理器优先返回 Mono<Void> 或本框架惯用异步类型；高吞吐消息处理复用现有 buffer / window / 批处理 sink / 去重；处理器保持幂等避免重放重复副作用。7)跨边界调用保持链式，不在 consumer 里 block，参数组装靠近边界。8)自检：是否还有 block() / 嵌套 subscribe() / 逐条低效调用；副作用是否合理拆到事件层；返回类型是否与相邻代码一致；高频或批量场景是否做了批处理。9)协同：阻塞 / 响应式冲突的根因路径走 $jetlinks-conventions；事件 / 订阅落地走 $jetlinks-events；跨模块调用走 $jetlinks-boundary；CRUD 副作用响应式化走 $jetlinks-crud。详细规范见 references/reactive-practice.md。
