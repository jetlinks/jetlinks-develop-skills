interface:
  display_name: "JetLinks Web Style"
  short_description: "JetLinks 前端交互方案选择目录（13 个方案 + 反传统后台感硬约束）"
  default_prompt: >-
    使用 $jetlinks-web-style 为当前页面选定交互方案。以 references/style-catalog.md 作为 JetLinks 前端交互方案选择目录。1)默认强制：除非任务命中"局部调整白名单"（仅改一个表单字段 / 仅改一个筛选条件 / 仅改一个弹窗内容 / 仅样式与文案与组件 props 微调），任何新增页面、重构页面壳层、调整信息架构或主筛选/主列表/主详情承载方式都必须先让用户在 13 个交互方案（标准管理表格页 / 资产卡片台账页 / 筛选工作台页 / 多对象对比页 / 处置工作台 / 对象详情工作区 / 主从详情工作区 / 配置态-运行态切换页 / 配置向导 / 资源选择器 / 监控感知页 / 分析钻取页 / 时间线日志流页）中选择。2)如果用户已明确"参考现在这个页面 / 沿用资产页 / 就按当前模板"，直接映射到最接近的方案继续。3)否则先用"业务任务 → 方案路由"识别用户进入页面的第一任务，再给 2-4 个候选；每个候选必须按统一字段说明：业务任务匹配理由、首屏 ASCII 线框骨架、信息密度目标、编辑触发梯度（inline / sectional / drawer / modal / page）、核心组件（来自 workspace 的 jetlinks-web-core）、状态 / 标签锚点、主要动作位置、不借鉴清单。4)给出默认项与单句业务理由，等待用户选择，不问"想要什么风格"这种开放问题。5)用户选定后输出 solution profile：solutionName / primaryFilterSurface / contentSurface / detailCarrier / editMode / coreComponents / actionPlacement / densityTarget / sidebarMode；并重申要在实现中执行的反传统后台感硬约束：编辑触发梯度优先 inline > sectional > drawer > modal > page、首屏不允许默认 "4 KPI 卡 + 顶部搜索 + 大表格" 套壳、状态先于字段、按方案给的密度目标落地、文案面向终端用户、弹窗不是唯一编辑路径、且当方案承载单对象详情时，头部摘要区必须按 catalog "反传统后台感硬约束 - 7. 详情页头部摘要区" 实现（图标 + 名称 inline 可改、状态徽标 + 快捷动作切换、标签就近 + / × 增删、说明 inline 可改、归属与元信息只读、1-3 个快捷动作；禁止"编辑按钮 → 弹出基本信息表单"、禁止标签/状态进编辑表单、禁止不同详情页头部各自一套结构）。6)方案选择只锁定业务结构和交互路径，不证明组件可用；实现回到 $jetlinks-web，按当前 workspace 的 jetlinks-web-core 核验导出、契约和相邻用法。
