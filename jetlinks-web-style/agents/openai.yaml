interface:
  display_name: "JetLinks Web Style"
  short_description: "JetLinks 前端交互方案选择目录（13 个方案 + 反传统后台感硬约束）"
  default_prompt: >-
    使用 $jetlinks-web-style 为当前页面选定交互方案。以 references/style-catalog.md 作为 JetLinks 前端交互方案选择目录。1)默认强制：除非任务命中"局部调整白名单"（仅改一个表单字段 / 仅改一个筛选条件 / 仅改一个弹窗内容 / 仅样式与文案与组件 props 微调），任何新增页面、重构页面壳层、调整信息架构或主筛选/主列表/主详情承载方式都必须先让用户在 13 个交互方案（标准管理表格页 / 资产卡片台账页 / 筛选工作台页 / 多对象对比页 / 处置工作台 / 对象详情工作区 / 主从详情工作区 / 配置态-运行态切换页 / 配置向导 / 资源选择器 / 监控感知页 / 分析钻取页 / 时间线日志流页）中选择。2)如果用户已明确"参考现在这个页面 / 沿用资产页 / 就按当前模板"，直接映射到最接近的方案继续。3)否则先用"业务任务 → 方案路由"识别用户进入页面的第一任务，再给 2-4 个候选；每个候选必须按统一字段说明：业务任务匹配理由、首屏 ASCII 线框骨架、信息密度目标、编辑触发梯度（inline / sectional / drawer / modal / page）、核心组件（来自 workspace 的 jetlinks-web-core）、状态 / 标签锚点、主要动作位置、不借鉴清单。4)给出默认项与单句业务理由，等待用户选择，不问"想要什么风格"这种开放问题。5)用户选定后输出 solution profile：solutionName / primaryFilterSurface / contentSurface / detailCarrier / editMode / coreComponents / actionPlacement / densityTarget / sidebarMode；并重申要在实现中执行的反传统后台感硬约束：编辑触发梯度优先 inline > sectional > drawer > modal > page、首屏不允许默认 "4 KPI 卡 + 顶部搜索 + 大表格" 套壳、状态先于字段、按方案给的密度目标落地、文案面向终端用户、弹窗不是唯一编辑路径。6)"文案面向终端用户"展开：写任何用户可见文案前先识别最终用户角色（运营 / 运维 / 平台管理员 / 租户管理员 / 设备管理员 / 业务管理员 / 终端使用者 / 开发集成方等具体角色）、用户目标动作、用户能看懂的术语和下一步；禁止把用户的原始需求文本、prompt、内部任务描述、需求文档原文或开发故事卡描述直接放进页面，必须按最终用户视角重写、动作动词开头；禁止暴露字段 key / 变量名 / API 路径 / 组件名 / Topic / 命令 ID / 权限码 / 内部 schema 名以及"TODO / 待定 / 占位文案 / 待接接口 / 原型说明 / 交互方式 / 设计意图"等开发态字样；空 / 错 / 载态要具体到对象与下一步，校验要带限制与示例，成功反馈要带对象名与影响范围；帮助优先 Tooltip / Popconfirm / 空态引导 / 状态附加说明，而不是顶部说明 banner。7)方案选择只锁定业务结构和交互路径，不证明组件可用；实现回到 $jetlinks-web，按当前 workspace 的 jetlinks-web-core 核验导出、契约和相邻用法。
