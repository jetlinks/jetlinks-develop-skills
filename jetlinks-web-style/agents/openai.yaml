interface:
  display_name: "JetLinks Web Style"
  short_description: "JetLinks 前端页面风格选择与结构复用"
  default_prompt: "使用 $jetlinks-web-style 先为当前页面选择结构风格：1)先判断是否真的需要选风格；如果用户已明确说参考某个现有页面或沿用某种结构，直接映射到对应风格。2)如果页面在多种结构之间存在明显分歧，用 2-4 个具体风格选项引导用户选择，不要提开放式设计问题。3)优先使用固定风格名，如 `筛选工作台式台账页`、`标准管理表格页`、`主从详情工作区`。4)一旦用户选定风格，记录固定的页面骨架、筛选面、内容面、操作区和信息密度目标，再交给 $jetlinks-web 实现。5)后续新增风格时，只扩 catalog，不改整体引导流程。"
