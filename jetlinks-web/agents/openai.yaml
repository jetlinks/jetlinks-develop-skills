interface:
  display_name: "JetLinks Web"
  short_description: "JetLinks 前端模版选择、能力复用与质量约束"
  default_prompt: >-
    使用 $jetlinks-web 处理前端任务：1)先分析业务目标、目标用户、进入后的第一任务、成功标准、单对象/多对象、关键指标数据源；缺 1 项且影响结构就先问，缺 2 项及以上或页面分型摇摆时必须先澄清。2)交互模版选择默认强制：除非任务命中"局部调整白名单"（仅改一个表单字段 / 仅改一个筛选条件 / 仅改一个弹窗内容 / 仅样式与文案与组件 props 微调），必须结合 $jetlinks-web-style 在 jetlinks-web-style/references/style-catalog.md 的 13 个交互模版（标准管理表格页 / 资产卡片台账页 / 筛选工作台页 / 多对象对比页 / 处置工作台 / 对象详情工作区 / 主从详情工作区 / 配置态-运行态切换页 / 配置向导 / 资源选择器 / 监控感知页 / 分析钻取页 / 时间线日志流页）中按"业务任务 → 模版路由"挑 2-4 个候选给用户；每个候选必须给出业务任务匹配理由、首屏 ASCII 线框骨架、信息密度目标、编辑触发梯度、核心组件、状态 / 标签锚点、主要动作位置和不借鉴清单；用户选定后再编码，不默认 CRUD 表格 + 编辑弹窗。jetlinks-web/references/interaction-solution-catalog.md 只是薄索引，事实源以 style-catalog.md 为准。3)组件、hooks、utils 最终以当前 workspace 的 jetlinks-web-core 为准：先核验 jetlinks-web-core/src/components/index.ts，再看组件实现和相邻页面用法；jetlinks-project-ui-cli 只在用户明确要求时作为外部参考，不能作为默认依赖、导入来源或组件存在性证据。4)模版锁定后，把卡片、列表、筛选、详情分区、轻量编辑、完整编辑、抽屉、底部操作、标签状态、图标、动态扩展、资源选择映射到 jetlinks-web-core 通用组件；并在实现时执行反传统后台感硬约束：编辑触发梯度 inline > sectional > drawer > modal > page（名称 / 标签 / 说明 / 备注 / 描述等轻量字段禁默认打开完整编辑弹窗）、首屏不允许默认"4 KPI 卡 + 顶部搜索 + 大表格"套壳、列表/卡片首屏状态先于字段、按模版给的密度目标落地、文案面向终端用户、弹窗不是唯一编辑路径；不复用必须说明查过的导出入口、相邻页面和能力缺口。5)新增或修改 Vue/JSX/TSX 前，先按"同 feature / 同模块 / 兄弟同域模块 / 共享包 / 公共导出"顺序查现有组件、hooks、utils、services、api 是否可复用；超过 300 行、重复结构 2 次以上、API/业务编排进入组件时必须当场拆分到子组件、hook、service/api 或 util，不为了降行数抽无职责包装组件，UI 组件保持无副作用。6)通用条件搜索优先核验 ConditionFilter 及其编码/回显、字段定义、loadOptions、loadSelectedOptions、rename、routeAlias、handleParamsItem 等能力；只有相邻页面稳定沿用或筛选确实很轻时才回退 ProSearch。7)视觉语言以 Ant Design / Ant Design Vue 和当前项目样式锚点为准，$frontend-design 只做本地体系内的层级、反馈和微交互润色；不引入新品牌、字体、配色或装饰元素。8)用户可见文案统一走当前 i18n，可用中文作默认值；不展示无意义统计、假图表、装饰数据，也不把线框标注、交互原理、开发说明放进最终用户界面。9)交付前报告：已选定模版、相关文件行数、查过的复用范围（同 feature / 同模块 / 兄弟同域模块 / 共享包 / 公共导出）以及任何新建抽象的理由。
