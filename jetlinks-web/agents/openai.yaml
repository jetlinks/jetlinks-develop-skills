interface:
  display_name: "JetLinks Web"
  short_description: "JetLinks 前端页面开发、能力复用与质量约束"
  default_prompt: "使用 $jetlinks-web 处理前端任务：1)先确认目标用户、第一任务、成功标准、单对象/多对象、关键指标数据源；缺 1 项且影响结构就先问用户，缺 2 项及以上必须先澄清。2)若页面壳层或风格存在多个合理方案，先结合 `jetlinks-web-style` 给用户少量贴合业务的风格/页面壳选项，用户选后再编码；不要默认传统 CRUD。3)若页面存在通用条件搜索且 workspace 已提供 `ConditionFilter` 及编码回显工具，默认优先用 `ConditionFilter` 承担搜索层；先按字段分型判断文本、时间/范围、布尔、项目/用户/区域/字典等选项字段、嵌套路径、无值条件是否可用字段驱动的通用值编辑器与字段级能力（如 `loadOptions` / `loadSelectedOptions` / `rename` / `routeAlias` / `handleParamsItem`）表达，不要直接新造字段专属组件。只有相邻页面明确沿用或筛选很轻时才回退 `ProSearch`。标准管理页再组合 `j-pro-table`、`EditDialog` 等能力。4)视觉与组件语言默认采用 Ant Design / Ant Design Vue，并仅在现有风格内结合 $frontend-design 做细化；页面风格选择不替代搜索组件选型。5)用户可见标题、字段展示名、列头、按钮和提示文案统一走 i18n，可用中文作默认值；没有真实数据源不做统计卡/图表，线框与设计说明不进入最终用户界面。"
